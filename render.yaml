# Deploy da API Flask em https://render.com (plano free)
services:
  - type: web
    name: pieng-pdf-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --chdir src --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
